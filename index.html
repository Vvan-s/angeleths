        {序号:140,姓名:"曲永华",性别:"女",来自学校:"",下乡地点:"宝石公社宝合大队",下乡时间:1968,返城时间:"1970",扎根突泉:"",已故时间:"",备注:""},
        {序号:141,姓名:"王环",性别:"女",来自学校:"",下乡地点:"宝石公社宝合大队",下乡时间:1968,返城时间:"",扎根突泉:"扎根",已故时间:"已故",备注:""}
    ];

    // 全局搜索关键词
    let currentKeyword = '';

    // 计算统计值（扎根&已故）
    function computeStats() {
        let root = 0, deceased = 0;
        for (let p of 知青数据) {
            if (p.扎根突泉 && p.扎根突泉.includes('扎根')) root++;
            if (p.已故时间 && p.已故时间.includes('已故')) deceased++;
        }
        return { root, deceased, total: 知青数据.length };
    }

    // 更新头部固定统计（不受搜索影响）
    function updateStatsUI() {
        const stats = computeStats();
        document.getElementById('totalCount').innerText = stats.total;
        document.getElementById('rootCount').innerText = stats.root;
        document.getElementById('deceasedCount').innerText = stats.deceased;
        document.getElementById('dynamicTotal').innerText = stats.total;
    }

    // 高亮文本辅助函数
    function highlightText(text, keyword) {
        if (!keyword || !text) return escapeHtml(text);
        const escapedText = escapeHtml(text);
        const escapedKeyword = escapeHtml(keyword);
        const regex = new RegExp(`(${escapedKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return escapedText.replace(regex, `<span class="highlight">$1</span>`);
    }

    // 判断一条记录是否匹配搜索关键词（姓名或大队）
    function isMatch(item, keyword) {
        if (!keyword) return true;
        const lowerKeyword = keyword.toLowerCase();
        const nameMatch = item.姓名 && item.姓名.toLowerCase().includes(lowerKeyword);
        const placeMatch = item.下乡地点 && item.下乡地点.toLowerCase().includes(lowerKeyword);
        return nameMatch || placeMatch;
    }

    // 渲染卡片列表 (支持搜索过滤)
    function renderCards(keyword = '') {
        const container = document.getElementById('recordsContainer');
        // 过滤数据
        const filteredData = keyword ? 知青数据.filter(item => isMatch(item, keyword)) : [...知青数据];
        const resultCount = filteredData.length;
        
        // 更新搜索结果计数
        const resultSpan = document.getElementById('resultCountSpan');
        if (resultSpan) {
            if (keyword) {
                resultSpan.innerHTML = `🔍 找到 ${resultCount} 条`;
            } else {
                resultSpan.innerHTML = `${resultCount} 条记录`;
            }
        }
        
        if (filteredData.length === 0) {
            container.innerHTML = `<div class="empty-msg">📭 没有找到与“${escapeHtml(keyword)}”相关的知青</div>`;
            return;
        }
        
        let html = '';
        for (let item of filteredData) {
            let genderShow = '—';
            if (item.性别 === '女') genderShow = '👩 女';
            else if (item.性别 === '男') genderShow = '👨 男';
            
            const isRoot = item.扎根突泉 && item.扎根突泉.includes('扎根');
            const isDeceased = item.已故时间 && item.已故时间.includes('已故');
            const downPlace = item.下乡地点 || '未知大队';
            const downYear = item.下乡时间 || '—';
            let backTime = item.返城时间 ? (item.返城时间 === "" ? "未返城/待考" : item.返城时间) : "—";
            const remark = item.备注 ? item.备注 : '';
            
            // 高亮姓名和大队（如果有关键词）
            const displayName = keyword ? highlightText(item.姓名, keyword) : escapeHtml(item.姓名);
            const displayPlace = keyword ? highlightText(downPlace, keyword) : escapeHtml(downPlace);
            const displayBack = escapeHtml(backTime);
            const displayRemark = remark ? (keyword ? highlightText(remark, keyword) : escapeHtml(remark)) : '';
            
            html += `
                <div class="record-card">
                    <div class="card-header">
                        <span class="name">${displayName}</span>
                        <span class="gender-badge">${genderShow}</span>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-item"><span class="detail-label">📍 大队</span><span class="detail-value">${displayPlace}</span></div>
                        <div class="detail-item"><span class="detail-label">📅 下乡</span><span class="detail-value">${downYear}年</span></div>
                        <div class="detail-item"><span class="detail-label">🚌 返城</span><span class="detail-value">${displayBack}</span></div>
                        ${displayRemark ? `<div class="detail-item"><span class="detail-label">📝 备注</span><span class="detail-value">${displayRemark}</span></div>` : ''}
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 10px; flex-wrap:wrap;">
                        ${isRoot ? '<span class="tag tag-root">🌾 扎根突泉</span>' : ''}
                        ${isDeceased ? '<span class="tag tag-deceased">🕯️ 已故</span>' : ''}
                        ${(!isRoot && !isDeceased && (!item.返城时间 || item.返城时间 === "")) ? '<span class="tag">🏡 去向待考</span>' : ''}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // 防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 导出Excel（始终导出完整原始数据，符合需求）
    function exportToExcel() {
        const sheetData = [
            ["序号", "姓名", "性别", "来自学校", "下乡地点", "下乡时间", "返城时间", "扎根突泉", "已故时间", "备注"]
        ];
        for (let p of 知青数据) {
            sheetData.push([
                p.序号, p.姓名, p.性别 || "", p.来自学校 || "", p.下乡地点 || "", 
                p.下乡时间 ? p.下乡时间.toString() : "", 
                p.返城时间 || "", 
                p.扎根突泉 || "", 
                p.已故时间 || "", 
                p.备注 || ""
            ]);
        }
        const ws = XLSX.utils.aoa_to_sheet(sheetData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "突泉县北京知青名录");
        XLSX.writeFile(wb, `突泉县北京知青下乡名单_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
    }

    // 搜索输入事件处理
    function onSearchInput(e) {
        currentKeyword = e.target.value.trim();
        renderCards(currentKeyword);
    }

    function clearSearch() {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.value = '';
            currentKeyword = '';
            renderCards('');
            searchInput.focus();
        }
    }

    // 初始化页面及事件绑定
    document.addEventListener('DOMContentLoaded', () => {
        updateStatsUI();
        renderCards('');
        
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        const exportBtn = document.getElementById('exportExcelBtn');
        
        if (searchInput) {
            searchInput.addEventListener('input', onSearchInput);
        }
        if (clearBtn) {
            clearBtn.addEventListener('click', clearSearch);
        }
        if (exportBtn) {
            exportBtn.addEventListener('click', exportToExcel);
        }
    });
</script>
